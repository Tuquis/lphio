<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HIO — Seguros & Consórcios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fafaf2;
      font-family: 'DM Sans', sans-serif;
    }

    .logo-wrap {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .logo-wrap img {
      height: 72px;
      object-fit: contain;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 600;
      color: #141410;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .sub {
      font-size: 0.95rem;
      color: #6b6b55;
      text-align: center;
      margin-bottom: 3rem;
    }

    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 1.5rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 220px;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      border: 1.5px solid #dde5dd;
      background: #ffffff;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-shadow: 0 2px 12px rgba(45,106,45,0.06);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(45,106,45,0.15);
      border-color: #4d9e4d;
    }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .card--seguros .card-icon  { background: #e8f4e8; }
    .card--consorcios .card-icon { background: #e8f0f8; }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: #141410;
      text-align: center;
    }

    .card-desc {
      font-size: 0.82rem;
      color: #6b6b55;
      text-align: center;
      line-height: 1.45;
    }

    .card-arrow {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      color: #2d6a2d;
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .card:hover .card-arrow { opacity: 1; }

    footer {
      margin-top: 4rem;
      font-size: 0.78rem;
      color: #aaa99a;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="WhatsApp_Image_2026-03-19_at_08.33.29-removebg-preview.png" alt="HIO Logo"/>
  </div>

  <p class="headline">O que você deseja visualizar?</p>
  <p class="sub">Escolha uma das opções abaixo para continuar</p>

  <div class="cards">
    <a class="card card--seguros" href="seguros.html">
      <div class="card-icon">🛡️</div>
      <span class="card-title">Seguros</span>
      <span class="card-desc">Auto, vida, residencial e empresarial</span>
      <span class="card-arrow">→</span>
    </a>

    <a class="card card--consorcios" href="consorcios.html">
      <div class="card-icon">🏠</div>
      <span class="card-title">Consórcios</span>
      <span class="card-desc">Imóveis, veículos e muito mais</span>
      <span class="card-arrow">→</span>
    </a>
  </div>

  <footer>HIO Soluções Financeiras &nbsp;|&nbsp; Bahia & São Paulo</footer>

</body>
</html>
